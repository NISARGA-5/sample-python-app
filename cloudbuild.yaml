steps:
- name: 'gcr.io/cloud-builders/docker'
  args:
    - 'build'
    - '-t'
    - 'asia-south1-docker.pkg.dev/project-1-501612/argocd-repo/sample-python-app:latest'
    - '.'

- name: 'gcr.io/cloud-builders/docker'
  args:
    - 'push'
    - 'asia-south1-docker.pkg.dev/project-1-501612/argocd-repo/sample-python-app:latest'

images:
- 'asia-south1-docker.pkg.dev/project-1-501612/argocd-repo/sample-python-app:latest'

options:
  logging: CLOUD_LOGGING_ONLY
